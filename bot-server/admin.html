<!DOCTYPE html>
<html lang="la">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOKOK Bot Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 16px 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-left .logo { font-size: 24px; }
.header h1 { font-size: 16px; font-weight: 600; }
.header h1 span { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .btn-logout { padding: 6px 14px; border: 1px solid #475569; background: transparent; color: #94a3b8; border-radius: 8px; font-size: 12px; cursor: pointer; }
.header .btn-logout:hover { background: #1e293b; color: #e2e8f0; }

.container { max-width: 800px; margin: 0 auto; padding: 16px; }

/* Cards */
.card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.card h2 .icon { font-size: 16px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.stat { background: linear-gradient(135deg, #0f172a, #1e293b); border: 1px solid #334155; border-radius: 12px; padding: 16px; text-align: center; }
.stat .num { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat .label { font-size: 11px; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Form */
.form-row { display: flex; gap: 10px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 100px; }
.form-group label { display: block; font-size: 11px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.form-group input:focus, .form-group select:focus { border-color: #38bdf8; }
.form-group select { appearance: auto; }

.btn-create { padding: 10px 20px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: transform 0.1s; }
.btn-create:hover { transform: scale(1.02); }
.btn-create:active { transform: scale(0.98); }

/* Table */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; border: 1px solid #334155; }
table { width: 100%; border-collapse: collapse; min-width: 500px; }
th { text-align: left; padding: 12px 10px; background: #0f172a; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; border-bottom: 1px solid #334155; }
td { padding: 12px 10px; border-bottom: 1px solid #1e293b; font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #1e293b; }

/* Badges */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
.badge-active { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-disabled { background: rgba(239,68,68,0.15); color: #f87171; }
.badge-expired { background: rgba(234,179,8,0.15); color: #facc15; }
.badge-forever { background: rgba(56,189,248,0.15); color: #38bdf8; }
.badge-admin { background: rgba(129,140,248,0.15); color: #a5b4fc; }
.badge-driver { background: rgba(100,116,139,0.15); color: #94a3b8; }

/* Action buttons */
.actions { display: flex; gap: 6px; flex-wrap: wrap; }
.btn { padding: 5px 10px; border: 1px solid #334155; background: transparent; color: #94a3b8; border-radius: 8px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.btn:hover { background: #334155; color: #e2e8f0; }
.btn-danger:hover { background: rgba(239,68,68,0.2); border-color: #dc2626; color: #f87171; }
.btn-sm { font-size: 10px; padding: 3px 8px; }

/* Logs */
.log-entry { padding: 10px 0; border-bottom: 1px solid #1e293b; font-size: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.log-entry:last-child { border-bottom: none; }
.log-entry .time { color: #475569; font-family: monospace; font-size: 11px; min-width: 140px; }
.log-entry .user { color: #38bdf8; font-weight: 600; }
.log-entry .action { color: #94a3b8; }
.log-entry .ip { color: #475569; }

/* Expiry edit */
.expiry-select { padding: 4px 6px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; border-radius: 6px; font-size: 12px; outline: none; cursor: pointer; }
.expiry-select:focus { border-color: #38bdf8; }

/* Toast */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; animation: fadeInUp 0.3s ease; }
.toast.error { background: #dc2626; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* Login screen */
#loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
#loginBox { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 360px; text-align: center; }
#loginBox h1 { font-size: 24px; margin-bottom: 4px; }
#loginBox h1 span { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#loginBox p { color: #64748b; margin-bottom: 24px; font-size: 14px; }
#loginBox input { width: 100%; padding: 12px 14px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none; }
#loginBox input:focus { border-color: #38bdf8; }
#loginBox button { width: 100%; padding: 12px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
#loginBox .error { color: #f87171; margin-top: 12px; font-size: 13px; }

#dashboard { display: none; }

/* Mobile responsive */
@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 14px; }
  .container { padding: 12px; }
  .card { padding: 16px; border-radius: 14px; }
  .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat { padding: 12px 8px; }
  .stat .num { font-size: 24px; }
  .stat .label { font-size: 10px; }
  .form-row { flex-direction: column; gap: 8px; }
  .form-group { min-width: 100%; }
  td { padding: 10px 8px; font-size: 12px; }
  th { font-size: 10px; padding: 10px 8px; }
  .actions { gap: 4px; }
  .log-entry .time { min-width: auto; }
}
</style>
</head>
<body>

<div id="loginScreen">
  <div id="loginBox">
    <h1><span>KOKOK</span> Admin</h1>
    <p>ລະບົບຈັດການຜູ້ໃຊ້ບອດ</p>
    <input type="password" id="adminPass" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ເຂົ້າສູ່ລະບົບ</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<div id="dashboard">
  <div class="header">
    <div class="header-left">
      <span class="logo">🚕</span>
      <h1><span>KOKOK</span> Admin</h1>
    </div>
    <button class="btn-logout" onclick="doLogout()">ອອກ</button>
  </div>
  <div class="container">

    <div class="card">
      <h2><span class="icon">📊</span> ສະຖິຕິ</h2>
      <div class="stats" id="stats"></div>
    </div>

    <div class="card">
      <h2><span class="icon">➕</span> ສ້າງຜູ້ໃຊ້ໃມ່</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="newUser" placeholder="driver01">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="text" id="newPass" placeholder="••••••">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="newRole">
            <option value="driver">Driver</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>ອາຍຸກ (ວັນ)</label>
          <select id="newExpiry">
            <option value="-2">3 ນາທີ (ທົດສອບ)</option>
            <option value="1">1 ວັນ</option>
            <option value="7">7 ວັນ</option>
            <option value="30" selected>30 ວັນ</option>
            <option value="90">90 ວັນ</option>
	              <option value="365">1 ປີ</option>
	              <option value="0">ຖາວນ</option>
	            </select>
        </div>
        <div class="form-group" style="flex:0;min-width:auto;display:flex;align-items:flex-end">
          <button class="btn-create" onclick="createUser()">ສ້າງ</button>
        </div>
      </div>
      <div id="createMsg" style="margin-top:10px;font-size:12px;"></div>
    </div>

    <div class="card">
      <h2><span class="icon">👥</span> ຜູ້ໃຊ້ທັງໝົດ</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Role</th>
              <th>ອາຍຸກ</th>
              <th>ສະຖານະ</th>
              <th>ເຂົ້າລ້າມສຸດ</th>
              <th>ຈັດການ</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2><span class="icon">📋</span> Log ລ້າສຸດ</h2>
      <div id="logList"></div>
    </div>

  </div>
</div>

<script>
let token = localStorage.getItem('admin_token') || '';

function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  return fetch(path, opts).then(r => r.json());
}

function toast(msg, isError) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function doLogin() {
  const pass = document.getElementById('adminPass').value;
  if (!pass) return;
  api('POST', '/api/login', { username: 'admin', password: pass })
    .then(data => {
      if (data.token) {
        token = data.token;
        localStorage.setItem('admin_token', token);
        showDashboard();
      } else {
        document.getElementById('loginError').textContent = data.error || 'Login failed';
      }
    })
    .catch(() => document.getElementById('loginError').textContent = 'Connection error');
}

function doLogout() {
  token = '';
  localStorage.removeItem('admin_token');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('adminPass').value = '';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadAll();
}

function loadAll() { loadStats(); loadUsers(); loadLogs(); }

function getExpiryBadge(expires_at) {
  if (!expires_at || expires_at === 'forever') return '<span class="badge badge-forever">∞ ຖາວນ</span>';
  const now = new Date();
  const exp = new Date(expires_at);
  const diff = (exp - now) / 86400000;
  if (diff < 0) return '<span class="badge badge-expired">⏰ ໝົດອາຍຸກ</span>';
  if (diff < 3) return '<span class="badge badge-expired">⏰ ' + Math.ceil(diff) + ' ວັນ</span>';
  return '<span class="badge badge-active">✓ ' + Math.ceil(diff) + ' ວັນ</span>';
}

function getStatusBadge(active, expires_at) {
  if (!active) return '<span class="badge badge-disabled">ປິດ</span>';
  if (expires_at && expires_at !== 'forever' && new Date(expires_at) < new Date())
    return '<span class="badge badge-expired">ໝົດອາຍຸກ</span>';
  return '<span class="badge badge-active">ໃຊ້ຢູ່</span>';
}

function loadStats() {
  api('GET', '/api/users').then(users => {
    const total = users.length;
    const active = users.filter(u => {
      if (!u.active) return false;
      if (u.expires_at && u.expires_at !== 'forever' && new Date(u.expires_at) < new Date()) return false;
      return true;
    }).length;
    const expired = users.filter(u => u.expires_at && u.expires_at !== 'forever' && new Date(u.expires_at) < new Date()).length;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="num">${total}</div><div class="label">ທັງໝົດ</div></div>
      <div class="stat"><div class="num">${active}</div><div class="label">ໃຊ້ຢູ່</div></div>
      <div class="stat"><div class="num">${expired}</div><div class="label">ໝົດອາຍຸກ</div></div>
    `;
  });
}

function loadUsers() {
  api('GET', '/api/users').then(users => {
    let html = '';
    users.forEach(u => {
      html += `<tr>
        <td>${u.id}</td>
        <td><strong>${u.username}</strong></td>
        <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-driver'}">${u.role}</span></td>
        <td>${getExpiryBadge(u.expires_at)}</td>
        <td>${getStatusBadge(u.active, u.expires_at)}</td>
        <td style="font-size:11px;color:#64748b">${u.last_login || '—'}</td>
        <td>
          <div class="actions">
            <select class="expiry-select" onchange="changeExpiry(${u.id}, this.value)" title="ປ່ຽນອາຍຸກ">
              <option value="" disabled selected>ອາຍຸກ</option>
              <option value="-2">3 ນາທີ (ທົດສອບ)</option>
              <option value="1" ${u.expires_at && Math.ceil((new Date(u.expires_at)-new Date())/86400000)<=1 && u.expires_at!=='forever'?'selected':''}>1 ວັນ</option>
              <option value="7">7 ວັນ</option>
              <option value="30">30 ວັນ</option>
              <option value="90">90 ວັນ</option>
              <option value="365">1 ປີ</option>
	              <option value="forever" ${u.expires_at==='forever'?'selected':''}>ຖາວນ</option>
	            </select>
            <button class="btn btn-sm" onclick="toggleUser(${u.id}, ${u.active})">${u.active ? 'ປິດ' : 'ເປີດ'}</button>
            <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id}, '${u.username}')">ລົບ</button>
          </div>
        </td>
      </tr>`;
    });
    document.getElementById('userTable').innerHTML = html || '<tr><td colspan="7" style="text-align:center;color:#64748b;padding:24px">ບໍ່ມີຜູ້ໃຊ້</td></tr>';
  });
}

function loadLogs() {
  api('GET', '/api/logs').then(logs => {
    let html = '';
    logs.forEach(l => {
      html += `<div class="log-entry">
        <span class="time">${l.created_at}</span>
        <span class="user">${l.username}</span>
        <span class="action">${l.action}</span>
        <span class="ip">${l.ip}</span>
      </div>`;
    });
    document.getElementById('logList').innerHTML = html || '<div style="color:#64748b;padding:16px;text-align:center">ບໍ່ມີ log</div>';
  });
}

function createUser() {
  const username = document.getElementById('newUser').value.trim();
  const password = document.getElementById('newPass').value.trim();
  const role = document.getElementById('newRole').value;
  const expiryVal = document.getElementById('newExpiry').value;
  const msgEl = document.getElementById('createMsg');

  if (!username || !password) {
    msgEl.innerHTML = '<span style="color:#f87171">❌ ກະລຸນາປ້ອນ username ແລະ password</span>';
    return;
  }

  let body = { username, password, role, expires_days: parseInt(expiryVal) };

  api('POST', '/api/register', body)
    .then(data => {
      if (data.success) {
        msgEl.innerHTML = `<span style="color:#4ade80">✅ ${data.message}</span>`;
        document.getElementById('newUser').value = '';
        document.getElementById('newPass').value = '';
        loadAll();
      } else {
        msgEl.innerHTML = `<span style="color:#f87171">❌ ${data.error}</span>`;
      }
    });
}

function changeExpiry(userId, value) {
  const days = value === 'forever' ? -1 : parseInt(value);
  api('POST', `/api/users/${userId}/expiry`, { expires_days: days })
    .then(data => {
      if (data.success) { toast('ປ່ຽນອາຍຸກແລ້ວ ✓'); loadAll(); }
      else toast(data.error || 'Error', true);
    });
}

function toggleUser(id, currentActive) {
  api('POST', `/api/users/${id}/toggle`)
    .then(data => { if (data.success) loadAll(); });
}

function deleteUser(id, username) {
  if (!confirm(`ລົບ ${username}?`)) return;
  api('DELETE', `/api/users/${id}`)
    .then(data => { if (data.success) { toast('ລົບແລ້ວ'); loadAll(); } });
}

// Auto-login
if (token) {
  api('GET', '/api/check').then(data => {
    if (data.valid) showDashboard();
    else { token = ''; localStorage.removeItem('admin_token'); }
  });
}
</script>
</body>
</html>
